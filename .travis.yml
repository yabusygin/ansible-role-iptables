---
os: linux
dist: bionic
language: python
python:
  - "3.6"
addons:
  apt:
    packages:
      - virtualbox
install:
  - pip install --requirement requirements.txt
  - wget https://releases.hashicorp.com/vagrant/2.2.6/vagrant_2.2.6_x86_64.deb
  - sudo dpkg --install ./vagrant_2.2.6_x86_64.deb
  - sudo apt-get --fix-broken install
before_script:
  - cd ../
  - mv ansible-role-iptables iptables
  - cd iptables
script:
  - python -m unittest discover --verbose
  - molecule test --all || cat /home/travis/.cache/molecule/iptables/default/vagrant-gateway.err && sudo journalctl --no-pager -u virtualbox.service
