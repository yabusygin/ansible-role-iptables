---
driver:
  name: docker
platforms:
  - name: instance
    image: ${TEST_IMAGE}
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    keep_volumes: false
provisioner:
  name: ansible
  playbooks:
    converge: ../default/converge.yml
